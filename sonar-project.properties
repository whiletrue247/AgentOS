# ==============================================
# SonarCloud Configuration for AgentOS
# ==============================================
# Organization & Project Key 需依實際 SonarCloud 設定調整
# 設定 SONAR_TOKEN secret 後即可啟用
# ==============================================

sonar.organization=whiletrue247
sonar.projectKey=whiletrue247_AgentOS
sonar.projectName=AgentOS

# Source
sonar.sources=01_Kernel,02_Memory,03_Tool_System,04_Engine,05_Orchestrator,06_Embodiment,07_PKG,08_Dashboard,08_Platform,09_OS_Integration,10_Marketplace,11_Sync_Handoff
sonar.tests=tests
sonar.python.version=3.12

# Coverage
sonar.python.coverage.reportPaths=coverage.xml

# Exclusions
sonar.exclusions=**/__pycache__/**,**/.pytest_cache/**,**/node_modules/**,**/.venv*/**,data/**,logs/**

# Quality Gate — 新代碼標準
# (實際 Quality Gate 在 SonarCloud Web UI 設定，此處僅供參考)
# - Coverage on new code >= 50%
# - Duplicated Lines on new code <= 5%
# - No new Bugs / Vulnerabilities (Blocker/Critical)
