version: "3.8"

services:
  agentos:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agentos-core
    environment:
      - NEO4J_URI=bolt://neo4j:7687
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - ./config/permissions.yaml:/app/config/permissions.yaml:ro
      - agentos-data:/app/data
      - agentos-logs:/app/logs
    networks:
      - internal-net
    depends_on:
      neo4j:
        condition: service_healthy

  neo4j:
    image: neo4j:5-community
    container_name: agentos-neo4j
    environment:
      - NEO4J_AUTH=none # Local dev only, set password in prod
    ports:
      - "7474:7474" # HTTP Browser
      - "7687:7687" # Bolt integration
    volumes:
      - neo4j-data:/data
    networks:
      - internal-net
    healthcheck:
      test: [ "CMD-SHELL", "wget --no-verbose --tries=1 --spider localhost:7474 || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # Optional: Hardened Sandbox using gVisor (runsc)
  # Requires host system to have runsc installed and configured in Docker daemon
  sandbox:
    image: python:3.12-slim
    container_name: agentos-sandbox
    # runtime: runsc  # Uncomment if gVisor is setup on host
    command: tail -f /dev/null
    networks:
      - sandbox-net
    # No volumes mounted to host for security
    # No access to internal-net (Neo4j/AgentOS) for security

networks:
  internal-net:
    driver: bridge
  sandbox-net:
    driver: bridge
    internal: true # No internet access by default

volumes:
  agentos-data:
  agentos-logs:
  neo4j-data:
