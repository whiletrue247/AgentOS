# ==============================================
# AgentOS Security Auto-Scan (Container Only)
# ==============================================
# Bandit 掃描已統一由 ci.yml 管理，此文件僅保留
# Container Vulnerability Scan (Trivy)。
# ==============================================

name: Container Security Scan

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  container-security:
    name: Container Vulnerability Scan (Trivy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Build local container image
        run: |
          docker build -t agentos:local .
          
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'agentos:local'
          format: 'table'
          # CRITICAL / HIGH 漏洞直接阻擋 PR
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
