# ==============================================
# AgentOS CI Pipeline
# ==============================================
# Triggers: push/PR to main
# Jobs:
#   1. test    — pytest + coverage
#   2. lint    — ruff + mypy
#   3. security — bandit (SAST) + trivy (container scan)
# ==============================================

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write  # for trivy sarif upload

jobs:
  # ================================================
  # 1. Test
  # ================================================
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      
      - name: Run tests with coverage
        run: |
          python -m pytest tests/ -v --tb=short \
            --cov --cov-report=xml --cov-report=term-missing
      
      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  # ================================================
  # 2. Lint
  # ================================================
  lint:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy
      
      - name: Ruff check
        run: ruff check . --output-format=github
      
      - name: Ruff format check
        run: ruff format --check .
      
      - name: Mypy type check
        run: mypy --check-untyped-defs --ignore-missing-imports .
        continue-on-error: true  # 漸進式收緊，暫不 block CI

  # ================================================
  # 3. Security
  # ================================================
  security:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      
      # ---- Bandit (Python SAST) ----
      - name: Install Bandit
        run: pip install "bandit[toml]>=1.7"
      
      - name: Run Bandit security scan
        run: |
          bandit -r . \
            -c pyproject.toml \
            -f json -o bandit-report.json \
            --exit-zero
          bandit -r . -c pyproject.toml -f screen || true
      
      - name: Upload Bandit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json
      
      # ---- Trivy (Container + FS Scan) ----
      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "table"
          exit-code: "0"
          severity: "HIGH,CRITICAL"
      
      # ---- Trivy Docker Image Scan ----
      - name: Build Docker image
        run: docker build -t agentos:ci .
      
      - name: Run Trivy image scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "agentos:ci"
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "HIGH,CRITICAL"
          exit-code: "0"
      
      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: "trivy-results.sarif"
        continue-on-error: true
